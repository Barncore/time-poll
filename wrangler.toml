name = "time-poll"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"

# KV namespace for poll data.
# After running `npx wrangler kv namespace create POLL_DATA`, replace the
# placeholder IDs below with the real ones printed by that command.
[[kv_namespaces]]
binding     = "POLL_DATA"
id          = "REPLACE_WITH_PRODUCTION_KV_ID"
preview_id  = "REPLACE_WITH_PREVIEW_KV_ID"
